name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-skills:
    name: Validate skill format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check canonical source boundary
        run: |
          echo "Checking that SKILL.md files only exist under skills/..."
          SKILL_FILES=$(find . -name "SKILL.md" -not -path './.git/*' -not -path './skills/*')
          if [ -n "$SKILL_FILES" ]; then
            echo "ERROR: SKILL.md files found outside skills/:"
            echo "$SKILL_FILES"
            exit 1
          fi
          echo "OK: All SKILL.md files are under skills/"

      - name: Validate SKILL.md frontmatter
        run: |
          EXIT_CODE=0
          for skill_dir in skills/*/; do
            SKILL_FILE="$skill_dir/SKILL.md"
            SKILL_NAME=$(basename "$skill_dir")

            if [ ! -f "$SKILL_FILE" ]; then
              echo "ERROR: $skill_dir missing SKILL.md"
              EXIT_CODE=1
              continue
            fi

            FIRST_LINE=$(head -1 "$SKILL_FILE")
            if [ "$FIRST_LINE" != "---" ]; then
              echo "ERROR: $SKILL_FILE does not start with YAML frontmatter"
              EXIT_CODE=1
              continue
            fi

            FM_NAME=$(sed -n '/^---$/,/^---$/p' "$SKILL_FILE" | grep '^name:' | head -1 | sed 's/^name: *//')
            FM_DESC=$(sed -n '/^---$/,/^---$/p' "$SKILL_FILE" | grep '^description:' | head -1)
            FM_VERSION=$(sed -n '/^---$/,/^---$/p' "$SKILL_FILE" | grep '^version:' | head -1)

            if [ -z "$FM_NAME" ]; then
              echo "ERROR: $SKILL_FILE missing 'name' field"
              EXIT_CODE=1
            elif [ "$FM_NAME" != "$SKILL_NAME" ]; then
              echo "ERROR: $SKILL_FILE name '$FM_NAME' does not match directory '$SKILL_NAME'"
              EXIT_CODE=1
            fi

            if [ -z "$FM_DESC" ]; then
              echo "ERROR: $SKILL_FILE missing 'description' field"
              EXIT_CODE=1
            fi

            if [ -z "$FM_VERSION" ]; then
              echo "WARN: $SKILL_FILE missing 'version' field"
            fi

            echo "OK: $SKILL_NAME"
          done
          exit $EXIT_CODE

  validate-scripts:
    name: Validate tooling syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Enforce repository layout boundaries
        run: python3 maintainer/scripts/install/validate_repo_layout.py

      - name: Check Python syntax
        run: |
          python3 - <<'PY'
          import ast
          from pathlib import Path

          files = [
              Path("maintainer/scripts/install/manage-governance.py"),
              Path("maintainer/scripts/install/run_manage_governance_smoke.py"),
              Path("maintainer/scripts/install/validate_repo_layout.py"),
              Path("maintainer/data/skill_test_data.py"),
              Path("maintainer/data/trigger_test_data.py"),
              Path("maintainer/scripts/evaluation/generate-skill-test-report.py"),
              Path("maintainer/scripts/evaluation/run_behavior_eval.py"),
              Path("maintainer/scripts/evaluation/run_trigger_tests.py"),
              Path("maintainer/scripts/evaluation/score-skill-transcript.py"),
          ]
          for path in files:
              ast.parse(path.read_text())
              print(f"OK: {path}")
          PY

      - name: Run temporary-directory installer smoke tests
        run: python3 maintainer/scripts/install/run_manage_governance_smoke.py

  install-smoke-test:
    name: OpenSkills install smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install from skills/ directory
        run: |
          mkdir -p /tmp/smoke-test
          cd /tmp/smoke-test
          npx openskills install $GITHUB_WORKSPACE/skills --universal -y

      - name: Sync and verify
        run: |
          cd /tmp/smoke-test
          npx openskills sync -y
          npx openskills list

          SKILL_COUNT=$(npx openskills list 2>&1 | grep -c '(project)')
          echo "Installed skills: $SKILL_COUNT"
          if [ "$SKILL_COUNT" -lt 10 ]; then
            echo "ERROR: Expected at least 10 skills, found $SKILL_COUNT"
            exit 1
          fi

      - name: Verify skill readability
        run: |
          cd /tmp/smoke-test
          npx openskills read scoped-tasking | head -5
          npx openskills read bugfix-workflow | head -5

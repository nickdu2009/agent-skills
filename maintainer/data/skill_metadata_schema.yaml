# Skill Metadata Schema
#
# This schema defines the compact metadata format extracted from SKILL.md files
# for use in evaluation and testing workflows. This is a generated artifact that
# supplements the portable SKILL.md core - it is NOT embedded in SKILL.md frontmatter.
#
# Purpose:
#   - Provide compact skill metadata for evaluation prompt construction
#   - Reduce token usage in trigger testing by avoiding full SKILL.md parsing
#   - Enable efficient skill discovery and categorization
#
# Source of truth: SKILL.md files in skills/ directory
# Generated by: maintainer/scripts/analysis/generate_skill_index.py

version: "0.1.0"

schema:
  skill_metadata:
    # Unique skill identifier (from SKILL.md frontmatter name field)
    name:
      type: string
      required: true
      description: "Skill name matching directory name"

    # Human-readable one-line description (from SKILL.md frontmatter)
    description:
      type: string
      required: true
      description: "Concise trigger-oriented description from frontmatter"

    # Relative path to skill directory from repository root
    directory:
      type: string
      required: true
      description: "Path to skill directory (e.g., 'skills/scoped-tasking')"

    # Derived skill family classification
    family:
      type: string
      required: true
      enum:
        - execution
        - orchestration
        - phase
      description: "Skill family for concurrency budget tracking"

    # Optional tags from frontmatter metadata
    tags:
      type: array
      items: string
      required: false
      description: "Tags from frontmatter metadata.tags"

    # Version from frontmatter metadata
    version:
      type: string
      required: false
      description: "Version from frontmatter metadata.version"

  skill_index:
    # Version of the index format
    schema_version:
      type: string
      required: true
      description: "Schema version for compatibility checking"

    # Timestamp of index generation
    generated_at:
      type: string
      required: true
      description: "ISO 8601 timestamp of generation"

    # List of skill metadata entries
    skills:
      type: array
      items: skill_metadata
      required: true
      description: "Array of skill metadata objects"

# Compact representation rules:
#   - Use only the description field for trigger evaluation prompts
#   - Include family for budget validation contexts
#   - Keep tags and version for future extensibility
#   - Directory path enables file lookup when needed
#   - Do NOT duplicate full SKILL.md content in this index

# Size optimization targets:
#   - Full SKILL.md frontmatter parsing: ~200-500 tokens per skill
#   - Compact index lookup: ~50-100 tokens per skill
#   - Target reduction: 60-80% for trigger evaluation prompts

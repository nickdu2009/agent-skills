<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
  <title>Agent Skills 使用手册</title>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <style>
    .markdown-section .title-en {
      color: #4b5563;
      line-height: 1.4;
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 1rem;
    }

    .markdown-section h1 + .title-en {
      font-size: 1.18rem;
      margin-top: -0.85rem;
      margin-bottom: 1.4rem;
    }

    .markdown-section h2 + .title-en {
      font-size: 1.04rem;
      margin-top: -0.65rem;
      margin-bottom: 1rem;
    }

    .markdown-section h3 + .title-en {
      font-size: 0.98rem;
      margin-top: -0.55rem;
      margin-bottom: 0.85rem;
    }
  </style>
</head>
<body>
  <div id="app">加载中...</div>
  <script>
    window.$docsify = {
      name: "Agent Skills 手册",
      nameLink: "/",
      homepage: "README.md",
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      mergeNavbar: true,
      notFoundPage: true,
      search: {
        placeholder: "搜索手册",
        noData: "没有找到相关结果",
        depth: 3
      },
      pagination: {
        previousText: "上一篇",
        nextText: "下一篇",
        crossChapter: true,
        crossChapterText: true
      },
      copyCode: {
        buttonText: "复制",
        successText: "已复制"
      },
      markdown: {
        renderer: {
          code: function (code, lang) {
            if (lang === "mermaid") {
              return '<div class="mermaid">' + code + "</div>";
            }
            return this.origin.code.apply(this, arguments);
          }
        }
      }
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({ startOnLoad: false });
    document.addEventListener("DOMContentLoaded", function () {
      var defined = false;
      var observer = new MutationObserver(function () {
        var blocks = document.querySelectorAll(".mermaid");
        if (blocks.length && !defined) {
          defined = true;
          mermaid.init(undefined, blocks);
        }
      });
      observer.observe(document.getElementById("app"), { childList: true, subtree: true });
    });
  </script>
</body>
</html>
